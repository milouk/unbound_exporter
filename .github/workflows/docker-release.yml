name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: milouk/unbound-exporter

  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/letsencrypt/unbound_exporter/releases/latest | jq -r .tag_name)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          DOCKER_TAG=${LATEST#v}
          echo "docker_tag=$DOCKER_TAG" >> $GITHUB_OUTPUT

      - name: Check if image already exists on Docker Hub
        id: check
        run: |
          DOCKER_TAG=${{ steps.upstream.outputs.docker_tag }}
          if docker manifest inspect milouk/unbound-exporter:$DOCKER_TAG > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image milouk/unbound-exporter:$DOCKER_TAG already exists, skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version $DOCKER_TAG detected, building image."
          fi

      - name: Checkout upstream at latest release
        if: steps.check.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          repository: letsencrypt/unbound_exporter
          ref: ${{ steps.upstream.outputs.version }}

      - name: Set up QEMU
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            milouk/unbound-exporter:${{ steps.upstream.outputs.docker_tag }}
            milouk/unbound-exporter:latest
